<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>题库后台管理｜备考刷题站</title>
<style>
:root{--blue:#2563eb;--dark:#111827;--muted:#64748b;--line:#e5e7eb;--bg:#f5f7fb;--card:#fff;--red:#dc2626;--green:#16a34a}*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:#1f2937;line-height:1.6}.shell{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.side{background:#0f172a;color:#fff;padding:22px;position:sticky;top:0;height:100vh;overflow:auto}.side h1{font-size:22px;margin-bottom:6px}.side p{color:#cbd5e1;font-size:13px;margin-bottom:18px}.select,.input,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fff;color:#111;outline:none}label{display:grid;gap:6px;font-size:13px;font-weight:700;color:#334155;margin-bottom:12px}.side label{color:#e2e8f0}.main{padding:22px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px}.top h2{font-size:24px}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px}.stat b{font-size:22px}.stat span{display:block;color:var(--muted);font-size:12px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 4px 18px rgba(15,23,42,.04);margin-bottom:14px}.toolbar{display:grid;grid-template-columns:1fr 150px 150px auto;gap:10px;margin-bottom:12px}.btn{border:0;border-radius:12px;padding:10px 14px;background:var(--blue);color:#fff;font-weight:800;cursor:pointer}.btn.secondary{background:#e5e7eb;color:#111}.btn.red{background:var(--red)}.btn.green{background:var(--green)}.btn:active{transform:scale(.98)}.list{display:grid;gap:10px}.qitem{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff}.qitem-head{display:flex;justify-content:space-between;gap:10px}.qitem h3{font-size:15px;margin-bottom:8px}.meta{font-size:12px;color:var(--muted)}.tag{font-size:12px;background:#eff6ff;color:#1d4ed8;border-radius:999px;padding:3px 8px;white-space:nowrap}.qactions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}.drawer{position:fixed;inset:0;background:rgba(15,23,42,.42);display:none;z-index:50}.drawer.show{display:block}.editor{position:absolute;right:0;top:0;bottom:0;width:min(720px,100%);background:#fff;padding:20px;overflow:auto;box-shadow:-20px 0 60px rgba(15,23,42,.22)}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.toast{position:fixed;right:18px;bottom:18px;background:#111827;color:#fff;border-radius:12px;padding:10px 14px;opacity:0;transform:translateY(8px);transition:.2s}.toast.show{opacity:1;transform:translateY(0)}.pager{display:flex;justify-content:center;gap:8px;margin-top:12px}.help{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:14px;padding:12px;font-size:13px;margin-bottom:14px}pre{white-space:pre-wrap;background:#0f172a;color:#dbeafe;border-radius:12px;padding:12px;font-size:12px;overflow:auto}
@media(max-width:880px){.shell{grid-template-columns:1fr}.side{position:static;height:auto}.toolbar,.stats,.form-grid{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <h1>题库后台</h1>
    <p>管理科目题库、审核状态、题型与解析。修改会直接写入 data/questions/*.json。</p>
    <label>管理密钥（如服务端设置 ADMIN_TOKEN）<input class="input" id="token" placeholder="可留空"></label>
    <label>选择科目<select class="select" id="subjectSelect"></select></label>
    <button class="btn green" id="newBtn">新增题目</button>
    <button class="btn secondary" id="backupBtn" style="margin-top:8px;width:100%">备份题库</button>
  </aside>
  <main class="main">
    <div class="top"><div><h2 id="title">题库管理</h2><p class="meta">参考考试宝后台形态：筛选、检索、编辑、审核、删除、备份。</p></div><button class="btn secondary" onclick="location.href='/'">返回刷题站</button></div>
    <div class="help">建议：正式录入大量题目之前先点击“备份题库”。后续可继续扩展批量导入 Excel/CSV、章节树、套卷管理和用户做题记录。</div>
    <div class="stats"><div class="stat"><b id="statTotal">0</b><span>当前筛选题数</span></div><div class="stat"><b id="statSubject">0</b><span>科目总题数</span></div><div class="stat"><b id="statPage">1</b><span>当前页</span></div><div class="stat"><b id="statSize">50</b><span>每页数量</span></div></div>
    <section class="card">
      <div class="toolbar"><input class="input" id="keyword" placeholder="搜索题干/章节/解析"><select class="select" id="typeFilter"><option value="">全部题型</option><option>单选</option><option>多选</option><option>判断</option><option>案例</option><option>简答</option></select><select class="select" id="statusFilter"><option value="">全部状态</option><option value="approved">已审核</option><option value="draft">草稿</option><option value="rejected">已退回</option></select><button class="btn" id="searchBtn">搜索</button></div>
      <div class="list" id="list"></div><div class="pager"><button class="btn secondary" id="prevBtn">上一页</button><button class="btn secondary" id="nextBtn">下一页</button></div>
    </section>
  </main>
</div>
<div class="drawer" id="drawer"><div class="editor"><div class="top"><h2 id="editorTitle">编辑题目</h2><button class="btn secondary" id="closeBtn">关闭</button></div><form id="form">
  <input type="hidden" id="qid">
  <div class="form-grid"><label>题型<select class="select" id="type"><option>单选</option><option>多选</option><option>判断</option><option>案例</option><option>简答</option></select></label><label>审核状态<select class="select" id="review_status"><option value="approved">已审核</option><option value="draft">草稿</option><option value="rejected">已退回</option></select></label><label>考试部分<input class="input" id="official_exam_part" placeholder="理论知识/技能考核/基础知识"></label><label>章节<input class="input" id="chapter" placeholder="如：数据标注与质检"></label><label>难度<select class="select" id="difficulty"><option>简单</option><option selected>普通</option><option>较难</option><option>困难</option></select></label><label>来源<input class="input" id="source_name" placeholder="自建原创题库"></label></div>
  <label>题干<textarea id="stem" rows="4" placeholder="请输入题干"></textarea></label>
  <label>选项（每行一个，系统自动按 A/B/C/D 显示）<textarea id="options" rows="5" placeholder="统一标注口径\n替代模型训练\n删除全部样本\n提高硬盘容量"></textarea></label>
  <label>答案（单选/判断填 A；多选填 A,B；简答/案例填参考答案）<input class="input" id="answer" placeholder="A 或 A,B"></label>
  <label>解析<textarea id="explanation" rows="5" placeholder="请输入解析"></textarea></label>
  <div class="form-grid"><label>来源链接<input class="input" id="source_url"></label><label>许可说明<input class="input" id="license_note"></label></div>
  <div class="qactions"><button class="btn" type="submit">保存</button><button class="btn secondary" type="button" id="copyJsonBtn">复制JSON</button></div>
  <pre id="jsonPreview"></pre>
</form></div></div>
<div class="toast" id="toast"></div>
<script src="./admin.js"></script>
</body>
</html>
